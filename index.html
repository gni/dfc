<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>dev format converter</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --accent: #007acc;
      --border: #252525;
      --text: #d4d4d4;
      --radius: 12px;
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

    body {
      margin: 0;
      padding: 40px;
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      box-sizing: border-box;
      overflow-y: auto; 
    }

    h2 { 
      margin: 0 0 30px 0; 
      font-size: 18px; 
      font-weight: 400;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 30px;
      position: sticky;
      top: 0;
      z-index: 1000;
      background: var(--bg);
      padding: 10px 0;
    }

    .select-wrapper { position: relative; }
    select {
      background: var(--surface);
      color: #fff;
      border: 1px solid var(--border);
      padding: 10px 15px;
      border-radius: 8px;
      outline: none;
      cursor: pointer;
      font-size: 14px;
      appearance: none;
      min-width: 150px;
    }
    
    .select-wrapper::after {
      content: '▼';
      font-size: 10px;
      position: absolute;
      right: 12px;
      top: 15px;
      color: #666;
      pointer-events: none;
    }

    #convertBtn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }

    .container {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .col {
      flex: 1;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      position: relative;
      min-height: 300px;
    }

    textarea {
      width: 100%;
      min-height: 300px;
      background: transparent;
      color: #9cdcfe;
      border: none;
      padding: 25px;
      box-sizing: border-box;
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      line-height: 1.6;
      resize: none;
      outline: none;
      overflow: hidden;
      display: block;
    }

    /* LE BOUTON COPY - MASQUÉ PAR DÉFAUT */
    #copyBtn {
      position: absolute;
      top: -1px;
      right: -1px;
      padding: 8px 16px;
      background: #2a2a2a;
      border: 1px solid var(--border);
      border-top-right-radius: var(--radius);
      border-bottom-left-radius: var(--radius);
      color: #fff;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
      z-index: 10;
      transition: all 0.2s;
      display: none; /* Masqué au départ */
      align-items: center;
      gap: 6px;
      text-transform: uppercase;
    }
    #copyBtn:hover { background: var(--accent); }
    #copyBtn.success { background: #4ec9b0; color: #000; }

    .detected-badge {
      font-size: 11px;
      color: #4ec9b0;
      background: rgba(78, 201, 176, 0.1);
      padding: 4px 10px;
      border-radius: 4px;
      display: none;
    }

    .error { color: #ff5555; font-size: 13px; display: none; }
  </style>
</head>
<body>
  <h2>Dev Format Converter</h2>
  
  <div class="controls">
    <div class="select-wrapper">
      <select id="formatSelect">
        <option value="json">JSON</option>
        <option value="yaml">YAML</option>
        <option value="toml">TOML</option>
        <option value="xml">XML</option>
        <option value="env">.ENV</option>
        <option value="query">QUERY STRING</option>
      </select>
    </div>
    <button id="convertBtn">CONVERT</button>
    <span id="detectedLabel" class="detected-badge"></span>
    <span id="errorMsg" class="error">INVALID FORMAT</span>
  </div>

  <div class="container">
    <div class="col">
      <textarea id="inputData" spellcheck="false" placeholder="// Paste input here..."></textarea>
    </div>
    
    <div class="col">
      <button id="copyBtn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        <span id="copyBtnText">COPY</span>
      </button>
      <textarea id="output" spellcheck="false" placeholder="// Result..." readonly></textarea>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
